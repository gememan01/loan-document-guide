<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>회천농협 덕계역지점 양식모음 출력</title>
  <style>
    :root {
      --bg: #eef2f1;
      --panel: #ffffff;
      --ink: #172220;
      --muted: #687673;
      --line: #d4ddda;
      --line-strong: #b8c6c1;
      --green: #145c48;
      --green-2: #1f7a61;
      --green-soft: #e5f2ed;
      --gold: #c6922e;
      --gold-soft: #fff3d9;
      --paper: #f8faf9;
      --shadow: 0 18px 42px rgba(22, 37, 33, 0.14);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      background: var(--bg);
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      letter-spacing: 0;
    }

    body { overflow: hidden; }
    button, input { font: inherit; }

    .app {
      display: grid;
      grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
      height: 100vh;
      height: 100dvh;
      min-height: 0;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      border-right: 1px solid var(--line);
      background: var(--panel);
    }

    .brand {
      padding: 24px 22px 18px;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), transparent 34%),
        var(--green);
    }

    .brand-kicker {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 9px;
      border: 1px solid rgba(255,255,255,0.32);
      border-radius: 999px;
      color: #f5ffe9;
      font-size: 12px;
      font-weight: 900;
    }

    .brand h1 {
      margin: 14px 0 4px;
      font-size: 26px;
      line-height: 1.18;
      font-weight: 900;
    }

    .brand p {
      margin: 0;
      color: rgba(255,255,255,0.82);
      font-size: 14px;
      font-weight: 800;
    }

    .search-wrap {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfc;
    }

    .search {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    .search:focus {
      border-color: var(--green-2);
      box-shadow: 0 0 0 3px rgba(31, 122, 97, 0.15);
    }

    .tree {
      flex: 1;
      min-height: 0;
      overflow-x: hidden;
      overflow-y: scroll;
      overscroll-behavior: contain;
      padding: 14px 12px 18px;
      background: linear-gradient(180deg, #fff, #f7f9f8);
      scrollbar-gutter: stable;
      -webkit-overflow-scrolling: touch;
    }

    .tree::-webkit-scrollbar {
      width: 12px;
    }

    .tree::-webkit-scrollbar-track {
      background: #edf2f0;
      border-left: 1px solid #d9e2df;
    }

    .tree::-webkit-scrollbar-thumb {
      background: #9fb6ae;
      border: 3px solid #edf2f0;
      border-radius: 999px;
    }

    .tree::-webkit-scrollbar-thumb:hover {
      background: #75988c;
    }

    .folder {
      margin-bottom: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .folder summary {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      align-items: center;
      gap: 9px;
      min-height: 46px;
      padding: 10px 12px;
      color: var(--ink);
      cursor: pointer;
      list-style: none;
      user-select: none;
    }

    .folder summary::-webkit-details-marker { display: none; }

    .folder summary:hover { background: #f5f8f7; }

    .folder[open] summary {
      border-bottom: 1px solid var(--line);
      background: var(--green-soft);
    }

    .folder-name {
      overflow: hidden;
      font-size: 14px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .folder-count {
      min-width: 28px;
      padding: 3px 7px;
      border-radius: 999px;
      color: var(--green);
      background: #fff;
      border: 1px solid #c9dfd7;
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .folder-glyph {
      position: relative;
      width: 22px;
      height: 16px;
      border: 1px solid #b9821e;
      border-radius: 3px;
      background: linear-gradient(180deg, #f4ca6a, #d99d34);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
    }

    .folder-glyph::before {
      content: "";
      position: absolute;
      top: -5px;
      left: 1px;
      width: 11px;
      height: 6px;
      border: 1px solid #b9821e;
      border-bottom: 0;
      border-radius: 3px 3px 0 0;
      background: #f1bf57;
    }

    .files {
      position: relative;
      display: grid;
      gap: 4px;
      padding: 8px 8px 10px 24px;
    }

    .files::before {
      content: "";
      position: absolute;
      top: 4px;
      bottom: 12px;
      left: 19px;
      width: 1px;
      background: #dbe3e1;
    }

    .file-button {
      position: relative;
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      align-items: center;
      gap: 9px;
      width: 100%;
      min-height: 40px;
      padding: 8px 10px;
      border: 1px solid transparent;
      border-radius: 7px;
      color: #24312e;
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .file-button::before {
      content: "";
      position: absolute;
      left: -5px;
      top: 50%;
      width: 8px;
      height: 1px;
      background: #dbe3e1;
    }

    .file-button:hover {
      border-color: #d7e2df;
      background: #f8fbfa;
    }

    .file-button[aria-current="true"] {
      border-color: #95c3b5;
      color: var(--green);
      background: #eef8f4;
      font-weight: 900;
    }

    .file-glyph {
      position: relative;
      width: 15px;
      height: 19px;
      border: 1px solid #aebbb7;
      border-radius: 3px;
      background: #fff;
    }

    .file-glyph::after {
      content: "";
      position: absolute;
      top: -1px;
      right: -1px;
      width: 6px;
      height: 6px;
      border-left: 1px solid #aebbb7;
      border-bottom: 1px solid #aebbb7;
      background: #eef2f1;
      clip-path: polygon(0 0, 100% 100%, 0 100%);
    }

    .file-title {
      overflow-wrap: anywhere;
      font-size: 13px;
      line-height: 1.28;
    }

    .empty {
      display: none;
      margin: 12px 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .main {
      display: grid;
      grid-template-rows: auto 1fr;
      min-width: 0;
      min-height: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-width: 0;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(10px);
    }

    .selected { min-width: 0; }

    .selected .label {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      margin: 0 0 5px;
      padding: 2px 8px;
      border-radius: 999px;
      color: var(--green);
      background: var(--green-soft);
      font-size: 12px;
      font-weight: 900;
    }

    .selected h2 {
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      font-size: 20px;
      line-height: 1.28;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      align-items: center;
      flex: 0 0 auto;
      gap: 8px;
    }

    .action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 76px;
      height: 40px;
      padding: 0 14px;
      border: 1px solid #bdc9c5;
      border-radius: 8px;
      color: var(--ink);
      background: #fff;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
    }

    .action:hover {
      border-color: #97aaa4;
      background: #f7faf9;
    }

    .action.primary {
      border-color: var(--green);
      color: #fff;
      background: var(--green);
    }

    .action.primary:hover {
      border-color: #0f4637;
      background: #0f4637;
    }

    .action:disabled {
      opacity: 0.58;
      cursor: progress;
    }

    .viewer-shell {
      min-width: 0;
      min-height: 0;
      padding: 18px;
      background:
        linear-gradient(135deg, rgba(20, 92, 72, 0.08), transparent 42%),
        linear-gradient(315deg, rgba(198, 146, 46, 0.10), transparent 36%),
        var(--bg);
    }

    .viewer-frame {
      width: 100%;
      height: 100%;
      border: 1px solid #bcc9c5;
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    @media (max-width: 880px) {
      body { overflow: auto; }

      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        height: auto;
        min-height: 100vh;
      }

      .sidebar {
        height: auto;
        max-height: none;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .tree {
        flex: 0 0 auto;
        max-height: 42vh;
        min-height: 220px;
        overflow-y: scroll;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .selected h2 { white-space: normal; }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .action { width: 100%; }

      .viewer-shell {
        height: 72vh;
        min-height: 540px;
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="양식 목록">
      <header class="brand">
        <span class="brand-kicker" id="formCount">15개 양식</span>
        <h1>회천농협 덕계역지점</h1>
        <p>양식모음 출력</p>
      </header>

      <div class="search-wrap">
        <input class="search" id="searchInput" type="search" placeholder="양식명 검색" autocomplete="off" />
      </div>

      <nav class="tree" id="treeRoot"></nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="selected">
          <p class="label" id="selectedGroup">일반 양식</p>
          <h2 id="selectedTitle">양식 선택</h2>
        </div>
        <div class="actions">
          <button class="action primary" type="button" id="printButton">출력</button>
          <button class="action" type="button" id="openButton">새 창</button>
        </div>
      </header>

      <section class="viewer-shell" aria-label="양식 미리보기">
        <iframe class="viewer-frame" id="viewer" title="선택한 양식 미리보기"></iframe>
      </section>
    </main>
  </div>

      for (let i = 0; i < binary.length; i += 1) {

      return new TextDecoder("utf-8").decode(bytes);

    function setLoading(isLoading) {
      printButton.disabled = isLoading;
      openButton.disabled = isLoading;
    }

    function selectForm(form) {
      currentForm = form;
      currentHtml = loadHtml(form);
      setLoading(true);
      viewer.srcdoc = currentHtml;
      selectedGroup.textContent = form.group;
      selectedTitle.textContent = form.title;

      document.querySelectorAll(".file-button").forEach((button) => {
        button.setAttribute("aria-current", String(button.dataset.file === form.file));
      });
    }

    function createFolder(group, forms, forceOpen) {
      const details = document.createElement("details");
      details.className = "folder";
      details.open = forceOpen || group.title === currentForm.group;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <span class="folder-glyph" aria-hidden="true"></span>
        <span class="folder-name">${group.title}</span>
        <span class="folder-count">${forms.length}</span>
      `;
      details.appendChild(summary);

      const files = document.createElement("div");
      files.className = "files";

      forms.forEach((form) => {
        const button = document.createElement("button");
        button.className = "file-button";
        button.type = "button";
        button.dataset.file = form.file;
        button.setAttribute("aria-current", String(currentForm.file === form.file));
        button.innerHTML = `
          <span class="file-glyph" aria-hidden="true"></span>
          <span class="file-title"></span>
        `;
        button.querySelector(".file-title").textContent = form.title;
        button.addEventListener("click", () => selectForm(form));
        files.appendChild(button);
      });

      details.appendChild(files);
      return details;
    }

    function renderTree(filter = "") {
      const keyword = filter.trim().toLowerCase();
      const isSearching = keyword.length > 0;
      let visibleTotal = 0;
      treeRoot.innerHTML = "";

      groups.forEach((group) => {
        const forms = group.forms.filter((form) =>
          `${group.title} ${form.title}`.toLowerCase().includes(keyword)
        );

        if (forms.length === 0 && isSearching) return;

        visibleTotal += forms.length;
        treeRoot.appendChild(createFolder(group, forms, isSearching));
      });

      const empty = document.createElement("p");
      empty.className = "empty";
      empty.textContent = "검색 결과 없음";
      empty.style.display = visibleTotal === 0 ? "block" : "none";
      treeRoot.appendChild(empty);
    }

    function openSelectedInNewWindow(printAfterOpen = false) {
      const win = window.open("", "_blank");
      if (!win) return;
      win.document.open();
      win.document.write(currentHtml || loadHtml(currentForm));
      win.document.close();

      if (printAfterOpen) {
        const runPrint = () => {
          win.focus();
          win.print();
        };
        if (win.document.readyState === "complete") {
          setTimeout(runPrint, 120);
        } else {
          win.addEventListener("load", runPrint, { once: true });
        }
      }
    }

    viewer.addEventListener("load", () => setLoading(false));

    searchInput.addEventListener("input", (event) => {
      renderTree(event.target.value);
    });

    printButton.addEventListener("click", () => {
      try {
        viewer.contentWindow.focus();
        viewer.contentWindow.print();
      } catch (error) {
        openSelectedInNewWindow(true);
      }
    });

    openButton.addEventListener("click", () => openSelectedInNewWindow(false));

    renderTree();
    selectForm(currentForm);
  </script>
</body>
</html>
